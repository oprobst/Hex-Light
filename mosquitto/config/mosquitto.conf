# Mosquitto MQTT Broker Configuration für Hex-Light

# Standard MQTT Port
listener 1883
protocol mqtt

# WebSocket Support (optional, für Browser-basierte MQTT Clients)
listener 9001
protocol websockets

# Erlaube anonyme Verbindungen (keine Authentifizierung)
# Für Produktion: allow_anonymous false und Passwort-Datei verwenden!
allow_anonymous true

# Persistenz aktivieren (Nachrichten werden gespeichert)
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest stdout
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information

# Verbindungs-Logging
connection_messages true
